<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee&display=swap');

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgba(0, 34, 255, 0.125);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 98vh;
            background-image: url('imagens/wallpaper004.jpg');
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-size: cover;
        }

        table {
            border-collapse: collapse;
        }

        caption {
            font-size: 40px;
            padding: 10px;
            background-color: rgba(0, 0, 0, 0.169);
            border-radius: 10px 10px 0px 0px;
            font-family: "Bungee", sans-serif;
            font-weight: 400;
            font-style: normal;
        }
        
        th {
            border: 1px solid black;
            padding: 10px;
            background-color: rgba(0, 85, 255, 0.645);
            color: rgb(0, 0, 0);
        }

        td {
            border: 1px solid black;
            padding: 10px;
        }

        tbody tr:nth-child(2n-1) {
            background-color: rgba(0, 0, 0, 0.071);
        }
    </style>
</head>
<body>
    <table>
        <caption>Filmes favoritos</caption>
        <thead>
            <tr>
                <th scope="col">Grupo</th>
                <th scope="col">Nomes</th>
                <th colspan="3" scope="colgroup">Filmes</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th rowspan="3" scope="rowgroup">Mulheres</th>
                <td>Ana Maria Santos</td>
                <td>Alien</td>
                <td>Alien</td>
                <td>Vingadores</td>
            </tr>
            <tr>
                <td>Beatriz Souza</td>
                <td>Hulk</td>
                <td>Inception</td>
                <td>Batman</td>
            </tr>
            <tr>
                <td>Cláudia Melo</td>
                <td>Oblivion</td>
                <td>Matrix</td>
                <td>Big Hero</td>
            </tr>
            <tr>
                <th rowspan="3" scope="rowgroup">Homens</th>
                <td>Bruno Mendonça</td>
                <td>Alien</td>
                <td>Alien</td>
                <td>Vingadores</td>
            </tr>
            <tr>
                <td>Daniel Lourenço</td>
                <td>Wall-E</td>
                <td>Oldboy</td>
                <td>Dangal</td>
            </tr>
            <tr>
                <td>Fabiano Mota</td>
                <td>Star Wars 5</td>
                <td>Taxi Driver</td>
                <td>Toy Story</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
